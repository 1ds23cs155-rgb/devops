apiVersion: v1
kind: Service
metadata:
  name: devops-app-service
  namespace: default
  labels:
    app: devops-app
spec:
  type: LoadBalancer
  selector:
    app: devops-app
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-config
  namespace: default
data:
  db.host: "postgres"
  db.port: "5432"
  db.name: "devops_app"
---
apiVersion: v1
kind: Secret
metadata:
  name: devops-secrets
  namespace: default
type: Opaque
stringData:
  db.username: "devops_user"
  db.password: "devops_secure_password"
  jwt.secret: "your-secure-jwt-secret-change-in-production"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-app
  namespace: default
