name: Advanced CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Run linter
        working-directory: ./app
        run: npm run lint

      - name: Run tests
        working-directory: ./app
        run: npm run test:ci

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./app/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  build-docker:
    name: Build Docker Image
    needs: [build-and-test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging-devops.example.com

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Environment: Staging"
          echo "URL: https://staging-devops.example.com"
          # Add your staging deployment commands here
          # Examples:
          # - kubectl set image deployment/devops-app-staging app=IMAGE_TAG -n staging
          # - aws ecs update-service --service devops-app-staging --force-new-deployment
          # - ssh deploy@staging-server 'cd /app && docker-compose pull && docker-compose up -d'

      - name: Run smoke tests on staging
        run: |
          echo "🧪 Running smoke tests..."
          # Wait for deployment
          sleep 10
          
          # Test health endpoint
          curl -f https://staging-devops.example.com/health || exit 1
          echo "✅ Staging health check passed"

      - name: Notify Slack (if configured)
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Staging Deployment: ${{ job.status }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  deploy-production:
    name: Deploy to Production
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://devops.example.com

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Create release notes
        id: changelog
        run: |
          git log --oneline ${{ github.event.before }}..${{ github.sha }} > CHANGELOG.txt
          cat CHANGELOG.txt

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production environment..."
          echo "Environment: Production"
          echo "URL: https://devops.example.com"
          # Add your production deployment commands here
          # Examples:
          # - kubectl set image deployment/devops-app app=IMAGE_TAG -n production
          # - aws ecs update-service --service devops-app --force-new-deployment
          # - ssh deploy@prod-server 'cd /app && docker-compose pull && docker-compose up -d'

      - name: Run smoke tests on production
        run: |
          echo "🧪 Running smoke tests..."
          sleep 15
          curl -f https://devops.example.com/health || exit 1
          curl -f https://devops.example.com/api/info || exit 1
          echo "✅ Production health check passed"

      - name: Run load test
        run: |
          echo "📊 Running basic load test..."
          # Minimal load test to ensure stability
          # Full load test should be run separately

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ""
          bodyFile: CHANGELOG.txt
          tag: release-${{ github.run_number }}
          commit: ${{ github.sha }}

      - name: Notify Slack (Success)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Production Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ Production deployment successful!\n*URL:* https://devops.example.com\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Production Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ Production deployment FAILED\n*Check:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
