---
- name: Deploy DevOps Application
  hosts: webservers
  become: yes
  vars:
    app_user: devops
    app_group: devops
    app_directory: /opt/devops-app
    docker_compose_version: "2.40.3"

  pre_tasks:
    - name: Update system packages
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose
          - git
          - curl
          - python3-docker
        state: present

    - name: Ensure Docker daemon is started
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create application user
      user:
        name: "{{ app_user }}"
        groups: docker
        append: yes
        state: present

  tasks:
    - name: Create application directory
      file:
        path: "{{ app_directory }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0755'

    - name: Clone repository
      git:
        repo: "{{ repository_url | default('https://github.com/user/devops.git') }}"
        dest: "{{ app_directory }}"
        version: "{{ git_branch | default('main') }}"
      become_user: "{{ app_user }}"

    - name: Copy environment file
      template:
        src: .env.j2
        dest: "{{ app_directory }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0600'

    - name: Build Docker image
      docker_image:
        name: devops-app
        tag: latest
        source: build
        build:
          path: "{{ app_directory }}"
          dockerfile: docker/Dockerfile

    - name: Start Docker Compose services
      docker_compose:
        project_src: "{{ app_directory }}"
        state: present
        pull: yes
      become_user: "{{ app_user }}"

    - name: Wait for application to be ready
      uri:
        url: "http://localhost:3000/health"
        method: GET
        status_code: 200
      register: result
      until: result.status == 200
      retries: 30
      delay: 10

    - name: Verify application health
      debug:
        msg: "Application is healthy: {{ result.json }}"

  handlers:
    - name: Restart Docker Compose
      docker_compose:
        project_src: "{{ app_directory }}"
        state: restarted
