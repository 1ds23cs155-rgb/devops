services:
  # Main website service (will be scaled)
  website:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - tourism-network

  # Nginx load balancer (routes to all website instances)
  nginx:
    image: nginx:alpine
    container_name: tourism-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf
    depends_on:
      - website
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tourism-network

  # Jenkins for CI/CD pipeline demo
  jenkins:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    container_name: tourism-jenkins
    user: "0:0"
    environment:
      - KUBECONFIG=/root/.kube/config
    ports:
      - "8088:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /Users/ajayreddy/.kube:/root/.kube:ro
    restart: unless-stopped
    networks:
      - tourism-network

networks:
  tourism-network:
    driver: bridge

volumes:
  jenkins_home:
