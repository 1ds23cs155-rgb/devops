apiVersion: v1
kind: Service
metadata:
  name: tourism-website
  namespace: default
  labels:
    app: tourism-website
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: tourism-website
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tourism-website-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: tourism-website
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
    - protocol: UDP
      port: 53

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tourism-website
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/from-to-www-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - tourism-website.com
    - www.tourism-website.com
    secretName: tourism-website-tls
  rules:
  - host: tourism-website.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tourism-website
            port:
              number: 80
  - host: www.tourism-website.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tourism-website
            port:
              number: 80
